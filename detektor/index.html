<body style="margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: black;">

    <section class="detektor"> 
        <input type="text" id="inputTexto" autocomplete="off" autocorrect="off" onkeypress="if(event.key==='Enter') redirigir()">
    </section>

</body>
  
<script>
    
    // Routes
    const rutas = {
    help: "invokah/help",
    about: "invokah/about",
    invokah: "invokah",
    project: "invokah/projects",
    "little detektiv": "littledetektiv",
    detektiv: "detektiv",
    shaila: "shaila",
    "shaila spark": "shaila",
    roger: "r", 
    r: "r",
    k: "k"
    };

    function redirigir() {
    const codigo = document.getElementById("inputTexto").value.trim().toLowerCase();

    if (codigo in rutas) {
        window.location.href = "/" + rutas[codigo];
    } else {
        window.location.href = "/404";
    }
    }
    
</script>
