<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="stylesheet" href="../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <meta charset="UTF-8">
  <meta name = "author" content = "Invokah">
  <meta name="description" content="Hi...">  > 
  <meta name="keywords" content="Invokah, Invo, Little Detektiv, Detektiv, Shaila, Shaila Spark, R, Roger, Layla">

  <meta name=" robots" content = "noindex, nofollow">
  <meta name = "format-detection" content = "telephone=no">
  <meta name = "apple-mobile-web-app-capable" content = "yes">
  <meta name = "viewport" content = "width=device-width, initial-scale=1.0">

<title>Little Detektiv</title>  
  <link rel="icon" sizes="32x32" href="../assets/favicon/olddetektivicon.ico">
</head>
  
<body>

  <div class="Tittle">
    <h1>LITTLE DETEKTIV</h1>
    <p>Los primeros pasos para volverse una Gran Detective.</p>

    <img alt="Shaila y R Jugando a ser Detektives" src="../assets/images/start_point.jpg" class="zoom">

  <div class="audio-container">
  
    <h2>♪ Inspiración (Lynne) </h2>

    <audio controls>
      <source src="../assets/music/shaila_inspiration(Lynne).mp3" type="audio/mpeg" alt="Audio de referencia provisional como inspiración para Shaila Spark">
      Halp.
    </audio>
  
    <p class="audio-description"> ¡Shaila entra en escena!</p>

    <div style="height:40px;"></div>

    <a href="../" class="color_link">Volver</a>
  </div>

     <!-- Lightbox -->
  <div id="lightbox">
    <span id="close-lightbox">&times;</span>
    <img id="lightbox-img" src="">
  </div>

<script>
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  const closeBtn = document.getElementById('close-lightbox');

  const zoomImages = document.querySelectorAll('.zoom');

  zoomImages.forEach(img => {
    img.addEventListener('click', () => {
      lightboxImg.src = img.src;
      lightbox.classList.add('active');
    });
  });

  closeBtn.addEventListener('click', () => {
    lightbox.classList.remove('active');
  });

  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) {
      lightbox.classList.remove('active');
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && lightbox.classList.contains('active')) {
      lightbox.classList.remove('active');
    }
  });
</script>

  
</body>
</html>
